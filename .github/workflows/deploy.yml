name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create empty env files for build
        run: |
          touch api-gateway/.env
          touch identity-service/.env
          touch post-service/.env
          touch media-service/.env
          touch search-service/.env

      - name: Build and push images
        run: |
          docker compose -f docker-compose.yml build
          docker compose -f docker-compose.yml push

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Add VPS SSH host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 72.62.236.196 >> ~/.ssh/known_hosts

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 72.62.236.196
          username: root
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /home/roots/projects/nodejsmicrosrvices

            mkdir -p api-gateway identity-service post-service media-service search-service

            echo "${{ secrets.API_GATEWAY_ENV }}" > api-gateway/.env
            echo "${{ secrets.IDENTITY_SERVICE_ENV }}" > identity-service/.env
            echo "${{ secrets.POST_SERVICE_ENV }}" > post-service/.env
            echo "${{ secrets.MEDIA_SERVICE_ENV }}" > media-service/.env
            echo "${{ secrets.SEARCH_SERVICE_ENV }}" > search-service/.env

            docker compose pull
            docker compose up -d --remove-orphans

            docker compose ps
            docker compose logs --tail=50